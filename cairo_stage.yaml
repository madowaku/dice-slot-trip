schema_version: 1
stage_id: cairo_hourglass
display_name: 砂時計のカイロ
source_spec_version: v0.8
engine_target: Godot 4.7
viewport:
  width: 720
  height: 1280
  orientation: portrait
estimated_play_time_sec:
  min: 480
  max: 600
mainline_length: 58
start_node: main_01
boss_node: main_58
inventory:
  capacity: 3
  duplicate_policy: disallow
  overflow_policy: prompt_replace_or_convert
  overflow_coin_value: 2
timer_policy:
  pause_during_map_overlay: true
  pause_during_route_choice: true
  pause_during_event_choice: true
  pause_during_item_replace_prompt: true
  pause_during_boss_intro: true
movement:
  dice_min: 1
  dice_max: 6
  preview_forward_nodes: 6
  branch_decision_mode: when_reached_during_move
  continue_remaining_pips_after_branch_choice: true
  loop_exit_requires_exact_landing: true
  loop_overshoot_mode: wrap
zones:
- id: market
  display_name: 市場地区
  mainline_range:
  - 1
  - 14
  scenic_key: cairo_market_day
- id: nile
  display_name: ナイル河岸
  mainline_range:
  - 15
  - 28
  scenic_key: cairo_nile_day
- id: desert
  display_name: 砂漠街道
  mainline_range:
  - 29
  - 44
  scenic_key: cairo_desert_day
- id: necropolis
  display_name: 墓都と黄金門
  mainline_range:
  - 45
  - 58
  scenic_key: cairo_necropolis_day
tile_types:
  NORMAL:
    visual_key: tile_normal
    priority: 0
  COIN:
    visual_key: tile_coin
    priority: 3
  REST:
    visual_key: tile_rest
    priority: 4
  RISK:
    visual_key: tile_risk
    priority: 5
  ITEM:
    visual_key: tile_item
    priority: 3
  EVENT:
    visual_key: tile_event
    priority: 2
  BRANCH:
    visual_key: tile_branch
    priority: 4
  WARP:
    visual_key: tile_warp
    priority: 4
  EXIT:
    visual_key: tile_exit
    priority: 5
  BOSS:
    visual_key: tile_boss
    priority: 6
items:
  water_canteen:
    display_name: 水筒
    kind: consumable_auto
    effect:
      trigger: before_risk_hp_damage
      cancel_hp_damage: 1
    consume_on_trigger: true
  compass:
    display_name: 方位磁針
    kind: consumable_manual
    use_window: after_roll_before_move
    effect:
      modify_roll_choice:
      - -1
      - 1
      clamp:
      - 1
      - 6
  sand_goggles:
    display_name: 砂よけゴーグル
    kind: passive_stage
    effect:
      immunity_tags:
      - sandstorm
      - sand_inertia
  scarab_seal:
    display_name: スカラベ印章
    kind: consumable_manual
    use_window: after_slot_resolve
    effect:
      carry_one_slot_value_to_next_set: true
  linen_bandage:
    display_name: リネン包帯
    kind: consumable_manual
    use_window: map_or_preboss
    effect:
      heal_hp: 1
      grant_boss_shield: 1
  hourglass_shard:
    display_name: 砂時計の欠片
    kind: consumable_manual
    use_window: before_roll
    effect:
      roll_speed_multiplier: 0.65
      inertia_multiplier: 0.65
      duration_rolls: 1
  merchant_charm:
    display_name: 商人の護符
    kind: consumable_auto
    effect:
      trigger: next_item_pickup
      upgrade_item_effect: 1
    consume_on_trigger: true
  brake_token:
    display_name: ブレーキ札
    kind: consumable_manual
    use_window: after_roll_before_move
    effect:
      modify_roll_choice:
      - -1
      clamp:
      - 1
      - 6
  hourglass_dust:
    display_name: 砂時計の粉
    kind: consumable_manual
    use_window: before_roll
    effect:
      roll_speed_multiplier: 0.8
      duration_rolls: 2
  golden_scarab:
    display_name: 黄金スカラベ
    kind: boss_resource
    effect:
      boss_attack_bonus: 1
      charges: 1
events:
  market_hawker:
    display_name: 市場の呼び込み
    choices:
    - id: coins_now
      label: コインを3枚もらう
      effects:
      - add_coins: 3
    - id: double_next_coin
      label: 次のCOINマスを2倍
      effects:
      - set_flag: next_coin_multiplier_2
  ferry_offer:
    display_name: 渡し船の客引き
    choices:
    - id: take_ferry
      label: 2コインで16マスへ
      requirements:
      - coins_at_least: 2
      effects:
      - add_coins: -2
      - teleport_to: main_16
    - id: decline
      label: 本線を進む
      effects: []
  nile_tailwind:
    display_name: ナイルの追い風
    choices:
    - id: take_token
      label: ブレーキ札を受け取る
      effects:
      - give_item: brake_token
  ruin_whisper:
    display_name: 遺跡のささやき
    choices:
    - id: duplicate_slot
      label: 現在のスロット1枠を複製
      requirements:
      - filled_slot_count_at_least: 1
      effects:
      - duplicate_selected_slot: true
    - id: trade_hp
      label: HP1で砂時計の欠片
      requirements:
      - hp_at_least: 2
      effects:
      - add_hp: -1
      - give_item: hourglass_shard
  golden_gate_exchange:
    display_name: 黄金門の両替
    repeatable_purchases:
    - id: boss_die
      label: 追加ボスダイス
      cost_coins: 10
      effect:
        add_boss_bonus_dice: 1
      max_purchases: 2
    - id: boss_shield
      label: ボス盾
      cost_coins: 5
      effect:
        add_boss_shield: 1
      max_purchases: 1
      unlock_condition:
        boss_bonus_dice_purchased_at_least: 1
    allow_skip: true
  oasis_water_seller:
    display_name: オアシスの水売り
    choices:
    - id: buy_heal
      label: 2コインでHP1回復
      requirements:
      - coins_at_least: 2
      effects:
      - add_coins: -2
      - add_hp: 1
    - id: decline
      label: 買わない
      effects: []
  tomb_stele:
    display_name: 墓廊の石碑
    choices:
    - id: coins
      label: コイン3枚
      effects:
      - add_coins: 3
    - id: shield
      label: HP1でボス盾
      requirements:
      - hp_at_least: 2
      effects:
      - add_hp: -1
      - add_boss_shield: 1
loops:
  oasis_loop:
    display_name: オアシス環
    entry_from: main_22
    entry_node: oasis_01
    return_node: main_23
    exit_node: oasis_08
    entry_mode: auto_on_land
    apply_entry_node_effect: true
    camera_mode: show_entire_loop
    reward_depletion: once_per_stage_then_normal
  tomb_loop:
    display_name: 墓廊の輪
    entry_from: main_43
    entry_node: tomb_01
    return_node: main_46
    exit_node: tomb_10
    entry_mode: auto_on_land
    apply_entry_node_effect: true
    camera_mode: show_entire_loop
    reward_depletion: once_per_stage_then_normal
boss:
  boss_id: hourglass_gate_warden
  display_name: 砂時計門の番人
  trigger_node: main_58
  scene_key: boss_cairo_night
  intro_pauses_timer: true
  player_hp_carries_in: true
  coin_exchange_event: golden_gate_exchange
branches:
