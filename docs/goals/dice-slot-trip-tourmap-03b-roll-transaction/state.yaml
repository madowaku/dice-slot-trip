version: 2

goal:
  title: "TOURMAP-03B 永続ロールトランザクション"
  slug: "dice-slot-trip-tourmap-03b-roll-transaction"
  kind: specific
  tranche: "ロール結果から交流・着地効果までの中断復帰を冪等化する"
  status: done

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true

agents:
  scout: installed
  worker: installed
  judge: installed

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    objective: "03B差分を保存復帰、既存ロジック、旧セーブ、未追跡除外の観点で監査する。"
    receipt:
      result: done
      summary: "Canvas状態を保存しない設計と通常phase復帰は成立。確定出目再表示、roll-idle復帰、phase逆行防止、ボス交流のdurable境界が不足。"
      evidence:
        - "autoload/game_state.gd roll_transaction"
        - "scripts/app/main.gd _continue_roll_transaction"
        - "scripts/app/main.gd EVENT→boss handoff and join flow"

  - id: T002
    type: judge
    assignee: Judge
    status: done
    objective: "現差分が03Bとしてcommit可能か、exactly-once境界を監査する。"
    receipt:
      result: done
      decision: "not_complete"
      summary: "EVENT→boss handoff消費後と100%登録・次個体保存後にMOVEMENT_COMMITTEDが残り、着地効果が再実行され得る。"
      next_allowed_task: T003

  - id: T003
    type: worker
    assignee: Worker
    status: done
    objective: "交流サブ状態、確定出目再表示、roll-idle復帰、phase順序防衛と中断QAを追加する。"
    allowed_files:
      - "autoload/game_state.gd"
      - "scripts/app/main.gd"
      - "tests/run_tests.gd"
      - "tests/run_roll_transaction_tests.gd"
      - "tests/run_roll_transaction_tests.gd.uid"
    verify:
      - "Godot targeted roll transaction tests"
      - "Godot full unit suite"
      - "runtime COIN, EVENT→boss, 100%-join interruption QA"
      - "CLEAN/LAP/LANDMARK/RISK/TOURMAP/M3/M4A regression"
      - "git diff --check"
    stop_if:
      - "Need files outside allowed_files."
      - "Need to change gameplay rewards or encounter probabilities."
      - "The same verification fails twice."
    receipt:
      result: done
      changed_files:
        - "autoload/game_state.gd"
        - "scripts/app/main.gd"
        - "tests/run_tests.gd"
        - "tests/run_roll_transaction_tests.gd"
        - "tests/run_roll_transaction_tests.gd.uid"
      summary: "単方向phase、確定出目再表示、roll-idle復帰、EVENT→交流→登録のdurable substateを実装。Canvas姿勢は保存対象外。"
      commands:
        - cmd: "Godot --headless --path . --script tests/run_roll_transaction_tests.gd"
          status: pass
        - cmd: "Godot --headless --path . --script tests/run_tests.gd"
          status: pass
        - cmd: "DICE_QA_ROLL_TRANSACTION=1 Godot --headless --path ."
          status: pass
        - cmd: "TOURMAP_DIE/LAP_LANDMARK/M3/M4A/CLEAN_LAP/RISK/ONE_DIE runtime QA"
          status: pass

  - id: T999
    type: judge
    assignee: Judge
    status: done
    objective: "修正後の03Bを中断復帰、冪等性、旧セーブ、全回帰で最終監査する。"
    expected_output:
      - "complete | not_complete"
      - "missing evidence"
      - "residual risks"
    receipt:
      result: done
      decision: "complete"
      summary: "EVENT→bossの保存済みPAIR/DOUBLE、handoff予約とevent clearの原子的保存、100%登録＋次個体生成、復帰後の画面遷移を監査。exactly-once境界と全回帰にcommit blockerなし。"
      missing_evidence: []
      residual_risks:
        - "画面遷移QAは実ボタン合成ではなく、明示的な復帰finalizer経路を決定的に検証している。"

checks:
  dirty_fingerprint: "03A commit c45e5d1; unrelated user specs, image imports, and reference images remain untracked and excluded."
  last_verification:
    result: pass
    task: T003
    evidence:
      - "ROLL_TRANSACTION_TESTS failures=0"
      - "DICE_SLOT_TRIP_TESTS failures=0"
      - "QA_ROLL_TRANSACTION checks=[true,true,true,true,true,true] passed=true"
      - "TOURMAP_DIE 20 rolls passed=true"
      - "LAP_LANDMARK/M3/M4A/CLEAN_LAP/RISK/ONE_DIE passed=true"
