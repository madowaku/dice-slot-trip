      result: done
      summary: "左上CLEAN表示を3行へ圧縮し、通常/MAX/失敗を短く判別できるようにした。"
      changed_files:
        - "scripts/app/main.gd"
      commands:
        - cmd: "Godot editor parse"
          status: pass
        - cmd: "git diff --check"
          status: pass

  - id: T006
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: low
    objective: "CLEAN 3/5/MAX/再到達/冪等性とv5中立移行の不足テストだけを追加する。"
    inputs:
      - "T999 not_complete receipt"
    constraints:
