        - "DICE_QA_CLEAN_LAP clean/dirty/boundaries/risks/noop/guard/save/migration all true"
        - "DICE_QA_RISK safe/challenge and DICE_QA_LAP_LANDMARK passed"
        - "M3/M4A/dice regressions passed in Worker receipt"
        - "360x640 HUD/result captures readable and unclipped"
