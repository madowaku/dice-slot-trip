      - "Test exposes ambiguous product semantics."
    receipt:
      result: done
      summary: "CLEAN 3/5/MAX/5→4→5再到達と各冪等性、CLEANフィールドなしv5→中立v6移行を決定的に検証。生産ロジック変更なし。"
      changed_files:
