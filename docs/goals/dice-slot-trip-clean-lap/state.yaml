      commands:
        - cmd: "Godot unit suite"
          status: pass
        - cmd: "DICE_QA_CLEAN_LAP"
          status: pass
        - cmd: "DICE_QA_LAP_LANDMARK"
          status: pass
        - cmd: "Godot editor parse"
          status: pass
        - cmd: "git diff --check"
          status: pass

  - id: T998
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "T006後にCLEANスライスの完了条件を再監査する。"
    inputs:
      - "All receipts including T999 and T006"
      - "Fresh verification"
    constraints:
      - "Do not implement."
    expected_output:
      - "complete | not_complete"
      - "remaining gaps"
    receipt:
      result: complete
      decision: complete
      summary: "T006がCLEAN 3/5/MAX/再到達/冪等性とv5中立移行の証拠を補完し、CLEANスライスの完了条件を満たした。"
      evidence:
