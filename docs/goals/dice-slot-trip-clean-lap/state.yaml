version: 2

goal:
  title: "CLEANラップ実装スライス"
  slug: "dice-slot-trip-clean-lap"
  kind: specific
  tranche: "実害ベースCLEAN判定、連続倍率、状態変化、周回結果と次目標を保存・回帰・360×640込みで完成する"
  status: done

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true

agents:
  scout: installed
  worker: installed
  judge: installed

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: high
    objective: "CLEAN仕様と現行LAP/RISK/event/save/UI/testを対応付け、実害と完全防御の正確な統合点を特定する。"
    inputs:
      - "docs/周回ポイント・クリーンラップ・加速連鎖仕様 v0.1.md"
      - "autoload/game_state.gd"
      - "scripts/game/lap_system.gd"
      - "scripts/game/reward_resolver.gd"
      - "scripts/app/main.gd"
      - "tests/run_tests.gd"
    constraints:
      - "Read-only; do not implement."
      - "既存RISKの実際の失敗/成功/ガード能力をコード根拠で区別する。"
      - "FLOWと未実装仕様をCLEAN Workerへ混ぜない。"
    expected_output:
      - "統合点と状態遷移"
      - "仕様と現行コードのギャップ"
      - "Worker allowed_files / verify / stop_if"
    receipt:
      result: done
      summary: "CLEAN中立フィールドとv6保存は既存。主な欠落はLapSystemの倍率/連続更新と、現RISKに実害経路がないこと。実害確定後だけclean=false/penalty+1、成功またはeven_guard完全防御は維持する。"
      evidence:
        - "autoload/game_state.gd:65-86,206-273,287-367"
        - "scripts/game/lap_system.gd:40-83"
        - "scripts/game/reward_resolver.gd:43-76"
        - "scripts/app/main.gd:638-640,839-880,801-816,1024-1040"
        - "scripts/game/board_model.gd:13-19"
        - "docs/周回ポイント・クリーンラップ・加速連鎖仕様 v0.1.md:351-431,683-695,1905"
      integration:
        - "LapSystemで完走後streakを決め、clean時だけ倍率を適用する。"
        - "LAP_COMMITと同一resolutionでstreak/best/段階報酬を冪等反映する。"
        - "RISKの受け流し/役なしでtile別実害を適用し、成功/完全防御はCLEAN維持。"
        - "HUDと周回結果へCLEAN状態、倍率、次目標を追加する。"
      proposed_allowed_files:
        - "autoload/game_state.gd"
        - "scripts/game/lap_system.gd"
        - "scripts/game/reward_resolver.gd"
        - "scripts/app/main.gd"
        - "tests/run_tests.gd"
        - "docs/reference/runtime-clean-*.png"

  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Scout証拠を監査し、CLEAN縦切りの安全なWorker境界と完了条件を決定する。"
    inputs:
      - "T001 receipt"
      - "Current dirty diff"
    constraints:
      - "Read-only; do not implement."
    expected_output:
      - "Decision"
      - "Exact Worker objective"
      - "allowed_files"
      - "verify"
      - "stop_if"
    receipt:
      result: done
      decision: "SAFE。既存v6フィールドとLAP resolutionでCLEANを原子的に実装し、RISKの実害/成功/完全防御/no-opを結果確定後に分類する。"
      next_allowed_task: T003
      rulings:
        - "clean時は更新後streak倍率、dirty時はx1.00かつstreakを1段低下。"
        - "段階報酬は2=COIN_S、3=DICE_ADD_1、5=DICE_KEEP。上昇遷移時だけ同一resolutionで付与。"
        - "RISKはtile 27/44/58/68/80固有効果。状態が変わらないno-opはCLEAN維持、guardも消費しない。"
        - "本ロールALL EVENでeven_guard_activeを有効化し、次の実効RISKを1回だけ完全防御する。"
        - "inventory保険アイテムとFLOW本実装は延期。セーブはv6据え置き。"

  - id: T003
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "既存v6フィールドで実害ベースCLEAN、連続倍率/段階報酬、5種RISK、ALL EVEN完全防御、HUD/周回結果、決定的QAを実装する。"
    allowed_files:
      - "autoload/game_state.gd"
      - "scripts/game/lap_system.gd"
      - "scripts/game/reward_resolver.gd"
      - "scripts/app/main.gd"
      - "tests/run_tests.gd"
      - "docs/reference/runtime-clean-*.png"
    verify:
      - "Godot 4.7 editor parse"
      - "Godot unit suite failures=0"
      - "DICE_QA_CLEAN_LAP deterministic route"
      - "DICE_QA_LAP_LANDMARK"
      - "DICE_QA_RISK updated safe/challenge"
      - "M3 smoke/routes, M4A/hardening, dice progression/early-stop"
      - "Fresh 360x640 CLEAN lap capture"
      - "git diff --check"
    stop_if:
      - "Need files outside allowed_files."
      - "実害か完全防御かを既存結果から判別できない。"
      - "新しい永続フィールドまたはsave version bumpが必要。"
      - "inventory保険アイテムの新設が必要。"
      - "同じ回帰検証が2回連続で失敗する。"
    receipt:
      result: done
      summary: "実害ベースCLEAN、更新後streak倍率、原子的な2/3/5段階報酬、5種RISK、ALL EVEN完全防御、HUD/周回結果/次目標、決定的QAを実装。"
      changed_files:
        - "autoload/game_state.gd"
        - "scripts/game/lap_system.gd"
        - "scripts/game/reward_resolver.gd"
        - "scripts/app/main.gd"
        - "tests/run_tests.gd"
      commands:
        - cmd: "Godot editor parse"
          status: pass
        - cmd: "Godot unit suite"
          status: pass
        - cmd: "DICE_QA_CLEAN_LAP"
          status: pass
        - cmd: "DICE_QA_RISK safe/challenge, DICE_QA_LAP_LANDMARK"
          status: pass
        - cmd: "M3 smoke, M4A hardening, dice progression, early stop"
          status: pass
        - cmd: "git diff --check"
          status: pass
      residual:
        - "GUI rendererでの360x640 CLEANキャプチャはPMへ引き継ぎ。"

  - id: T999
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "CLEAN実装が仕様、保存互換、回帰、360×640の完了条件を満たすか監査する。"
    inputs:
      - "All done task receipts"
      - "Last verification"
      - "Current dirty diff"
      - "Fresh runtime captures"
    constraints:
      - "Do not implement."
      - "必要Workerが残る場合はcompleteを拒否する。"
    expected_output:
      - "complete | not_complete"
      - "missing evidence"
      - "next task if not complete"
    receipt:
      result: not_complete
      decision: "実装と360x640 UIは正しいが、CLEAN 3/5・MAX・再到達報酬とv5中立移行の決定的証拠が不足。"
      missing_evidence:
        - "streak 3=DICE_ADD_1、5=DICE_KEEP、5→5非再付与、5→4→5再付与、各同一ID冪等性。"
        - "CLEANフィールドなしv5読込時のclean=true、penalty/streak/best=0、guard=false。"
      next_task: T006

  - id: T004
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: low
    objective: "CLEAN境界を越えて変更されたRISK挑戦成功報酬を従来値へ戻し、成功時CLEAN維持と更新QAを保つ。"
    inputs:
      - "T002 Judge clarification"
      - "PM live diff review"
    constraints:
      - "CLEAN失敗/guard/no-op/5種実害は変更しない。"
      - "RISK成功報酬の再設計を行わない。"
    allowed_files:
      - "scripts/app/main.gd"
    verify:
      - "DICE_QA_RISK challenge"
      - "DICE_QA_CLEAN_LAP"
      - "Godot unit suite"
      - "git diff --check"
    stop_if:
      - "Need files outside allowed_files."
      - "既存成功報酬の復元がCLEAN判定を壊す。"
    receipt:
      result: done
      summary: "RISK挑戦成功報酬を従来値へ戻し、CLEAN成功判定だけを新規挙動として残した。"
      changed_files:
        - "scripts/app/main.gd"
      commands:
        - cmd: "DICE_QA_RISK challenge"
          status: pass
        - cmd: "DICE_QA_CLEAN_LAP"
          status: pass
        - cmd: "Godot unit suite"
          status: pass
        - cmd: "git diff --check"
          status: pass

  - id: T005
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: low
    objective: "360x640で窮屈な左上CLEAN表示を、意味を保った3行の短い表記へ圧縮する。"
    inputs:
