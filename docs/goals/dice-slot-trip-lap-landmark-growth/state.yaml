        - "scripts/app/main.gd:603-646 (turn pipeline)"
        - "scripts/app/main.gd:628-635 (normal lap crossing)"
        - "scripts/app/main.gd:686-694 (warp lap crossing)"
        - "scripts/app/main.gd:705-708 (current landmark landing)"
