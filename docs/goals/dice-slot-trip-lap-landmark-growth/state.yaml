  slug: "dice-slot-trip-lap-landmark-growth"
  kind: specific
  tranche: "最初の安全なLAP／FLOW／名所発展統合スライスを実装し、保存・回帰・360×640を検証する"
  status: done

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true

agents:
  scout: installed
  worker: installed
  judge: installed

active_task: null

tasks:
