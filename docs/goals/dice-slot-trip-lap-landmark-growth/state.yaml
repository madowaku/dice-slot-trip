        - "docs/旅の窓 v0.1.md"
        - "Android Health Connect official steps/read/availability docs (checked 2026-07-13)"
        - "Godot 4.7 Android plugin v2 official docs"
        - "Google Maps URLs official docs"
      health_connect:
        architecture:
          - "StepProvider interface → MockStepProvider / HealthConnectStepProvider → FootprintServiceの3層に分離。"
          - "FOOTSTEP-01は日付注入可能な段階計算・差分受取・基本1個・99上限・v7 additive save・Editor mockだけ。Android権限やKotlinはFOOTSTEP-02へ分離。"
          - "名所Lvは停止のみで上げ、足あとは別のにぎわい装飾フラグへ使う。LAP/CLEAN/FLOW/ランキングへ影響させない。"
        privacy_and_platform:
          - "任意opt-in、READ_STEPSのみ、生レコード/時刻/位置/提供元を保存せず、サーバー送信なし。拒否・取消・利用不能でも基本支給と通常プレイを維持。"
          - "Android 14+はシステム、13以下はPlayアプリ。公式上はAndroid 9+とGoogle Play servicesが必要で、work profileは非対応条件に追加する。"
          - "June 2026の端末歩数帰属変更を考慮し、DataOrigin filterなしのCOUNT_TOTAL aggregateを維持する。"
        evidence:
          - "https://developer.android.com/health-and-fitness/health-connect/features/steps"
          - "https://developer.android.com/health-and-fitness/health-connect/read-data"
          - "https://developer.android.com/health-and-fitness/health-connect/availability"
          - "https://docs.godotengine.org/en/4.7/tutorials/platform/android/android_plugin.html"
      travel_window:
        architecture:
          - "最初は香辛料市場Lv1のplace_query検索だけ。純粋URL builderをテストし、UIの明示操作でOS.shell_open、直前保存、連打cooldown。"
          - "api=1必須、queryをURI encode。座標・衛星・Street Viewは実機確認後まで無効。APIキー/Maps SDK/課金APIは使わない。"
          - "外部地図閲覧に報酬・FLOW・コレクションを結び付けず、復帰toastのみ。"
        evidence:
          - "https://developers.google.com/maps/documentation/urls/get-started"
      next_goal_candidates:
        - "FOOTSTEP-01 pure service + mock + save + boundary tests"
        - "TRAVEL-WINDOW-01 URL builder + one search button + save/cooldown QA"
      risks:
        - "Health ConnectはPlay申告、プライバシーポリシー、権限理由Activity、Android 13/14実機QAが必要。"
        - "端末日付巻き戻し、同日差分受取、権限取消、10秒timeoutを決定的に試験する。"
        - "Mapsの座標/Street View対応は自動推測せず手動確認する。"

