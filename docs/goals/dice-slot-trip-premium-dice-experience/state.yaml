version: 2

goal:
  title: "DICE SLOT TRIP プレミアム・ダイス体験"
  slug: "dice-slot-trip-premium-dice-experience"
  kind: specific
  tranche: "新ダイス消費ループ、改訂盤面、2.5Dダイス、プレミアムUIを統合し回帰監査する"
  status: done

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true

agents:
  scout: installed
  worker: installed
  judge: installed

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: high
    objective: "新3仕様と現行M4A実装を対応付け、状態遷移・盤面・表示・保存の安全な実装境界を決める。"
    inputs:
      - "docs/2.5Dサイコロ演出仕様 v0.1.md"
      - "docs/ダイス獲得・スロット解禁仕様 v0.1.md"
      - "docs/マス配分・基本アイテム20個 改訂差分 v0.2.md"
      - "scripts/app/main.gd"
      - "autoload/game_state.gd"
      - "scripts/core/dice_logic.gd"
      - "scripts/game/board_model.gd"
      - "scripts/game/reward_resolver.gd"
      - "tests/run_tests.gd"
    constraints:
      - "Read-only."
      - "既存の未コミットM4A/M3変更を前提として保全する。"
    expected_output:
      - "仕様差分マップ"
      - "最小状態機械"
      - "段階別Worker allowed_files"
      - "回帰と画面QA境界"
    receipt:
      result: done
      summary: "current_dice_countの一時状態化、DOUBLE/3ダイス役後遷移、改訂盤面、2.5D SubViewport、プレミアムUIの差分を特定。現行unlocked_dice_count永続成長、旧盤面配分、2Dボタン疑似ダイスが主要な不一致。"
      evidence:
        - "autoload/game_state.gd"
        - "scripts/app/main.gd"
        - "scripts/core/dice_logic.gd"
        - "scripts/game/board_model.gd"
        - "scripts/game/board_view.gd"
        - "scripts/game/reward_resolver.gd"
        - "tests/run_tests.gd"
      state_machine: "1 -> 2 DOUBLE CHANCE -> 3 DICE SLOT -> TRIPLE=3, STRAIGHT/PAIR/ALL EVEN only=2, otherwise=1; temporary 5 never consumes current."
      baseline: "Godot 4.7 unit suite 52+ PASS; current screenshots captured for 1/3 dice."
      spawned_tasks:
        - T002

  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Scout結果と現状画面を監査し、最初の安全な実装スライスを決定する。"
    inputs:
      - "T001 receipt"
      - "現在のランタイムキャプチャ"
      - "ステージ画面イメージ.png"
    constraints:
      - "Do not implement."
    expected_output:
      - "Decision"
      - "Exact Worker objective"
      - "allowed_files"
      - "verify"
      - "stop_if"
    receipt:
      result: done
      decision: "APPROVE T003 first。current_dice_count一時状態と遷移を先に固定し、盤面→2.5D→UIの順に進める。"
      next_allowed_task: T003
      visual_audit: "現行は読めるが平面的で、細い盤面・疎な上部情報・テキスト型モード切替・トレイ不在。参考画面のボスカード、主役盤面、ミニマップ、立体ダイストレイ階層をT005/T006の基準とする。"

  - id: T003
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: high
    objective: "新ダイス状態機械、DOUBLE、Dice Slot消費・継続、保存移行を実装する。"
    allowed_files:
      - "autoload/game_state.gd"
      - "scripts/app/main.gd"
      - "scripts/core/dice_logic.gd"
      - "scripts/game/reward_resolver.gd"
      - "tests/run_tests.gd"
      - "README.md"
      - "docs/IMPLEMENTATION_NOTES.md"
    verify:
      - "DOUBLEと1/2/3の純粋遷移テスト"
      - "新旅/reset/load/v4 migration"
      - "DICE_ADD_1/SLOT_READY/KEEPの上限・順序"
      - "追加1/3/5ダイスがcurrentを変更しない"
      - "M0-M4A、M3、早止め、一括停止、自動停止、DEBUG回帰"
    stop_if:
      - "Need files outside allowed_files."
      - "仕様上の処理順が曖昧。"
      - "Verification fails twice without a localized cause."
    receipt:
      result: done
      summary: "current_dice_count一時状態、DOUBLE、3ダイス役後遷移、DICE_ADD_1/SLOT_READY/KEEP、v5保存移行、通常UI固定化を実装。追加1/3/5はcurrent不変。"
      changed_files:
        - "autoload/game_state.gd"
        - "scripts/app/main.gd"
        - "scripts/core/dice_logic.gd"
        - "scripts/game/reward_resolver.gd"
        - "tests/run_tests.gd"
        - "docs/IMPLEMENTATION_NOTES.md"
      commands:
        - cmd: "Godot 4.7 tests/run_tests.gd"
          status: pass
        - cmd: "DICE_QA_DICE_PROGRESSION / EARLY_STOP / STOP_ALL / EXTRA_DICE_CONTROLS"
          status: pass
        - cmd: "DICE_QA_M3 / M4A / FIVE_DICE"
          status: pass
        - cmd: "git diff --check"
          status: pass

  - id: T004
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "改訂90マス配分、主要ダイス供給、リスクの見える化を実装する。"
    allowed_files:
      - "scripts/game/board_model.gd"
      - "scripts/game/board_view.gd"
      - "scripts/app/main.gd"
      - "scripts/game/reward_resolver.gd"
      - "data/events/cairo_m4a_events.json"
      - "tests/run_tests.gd"
      - "docs/IMPLEMENTATION_NOTES.md"
      - "docs/reference/runtime-premium-board-*.png"
    verify:
      - "90 total, each district 18, exact v0.2 counts"
      - "RISK 5 with circular spacing >=8; ITEM 10 spacing >=4"
      - "heavy tiles are not within 3 spaces"
      - "ITEM 35/55/10 and overflow conversion"
      - "RISK safe/challenge never removes current dice"
      - "minimap and neighborhood show RISK/STAGE_SPECIAL"
      - "M0-M4A regression"
    stop_if:
      - "Need files outside allowed_files."
      - "盤面制約を満たす配置が決められない。"
    receipt:
      result: done
      summary: "90マスを39/11/10/6/3/3/4/3/4/2/5へ更新。5地区18、RISK/ITEM/heavy間隔を満たし、ITEM 35/55/10、DOUBLE併給、RISK安全/追加3ダイス挑戦、STAGE_SPECIAL表示を実装。"
      changed_files:
        - "scripts/game/board_model.gd"
        - "scripts/game/board_view.gd"
        - "scripts/app/main.gd"
        - "tests/run_tests.gd"
        - "docs/IMPLEMENTATION_NOTES.md"
        - "docs/reference/runtime-premium-board-risk.png"
      commands:
        - cmd: "Godot 4.7 tests/run_tests.gd"
          status: pass
        - cmd: "DICE_QA_RISK safe/challenge"
          status: pass
        - cmd: "M3/M4A/dice controls regression"
          status: pass
        - cmd: "Compatibility renderer board capture"
          status: pass

  - id: T005
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: high
    objective: "制御された2.5Dサイコロ、1／2／3／5レイアウト、早止め、役演出を実装する。"
    allowed_files:
      - "scripts/game/dice_presentation_3d.gd"
      - "scripts/game/dice_presentation_3d.gd.uid"
      - "scenes/dice/dice_world_3d.tscn"
      - "scripts/app/main.gd"
      - "tests/run_tests.gd"
      - "docs/IMPLEMENTATION_NOTES.md"
      - "docs/reference/runtime-premium-dice-*.png"
    verify:
      - "SubViewport 640x280 transparent and Compatibility renderer"
      - "logic-driven faces 1-6 with deterministic final orientation"
      - "max five dice pre-created and reused"
      - "1/2/3 horizontal and 5 as 3+2 readable layouts"
      - "left early stop, stop all, auto stop, fixed rolls"
      - "M3/M4A/RISK extra dice use same presentation"
      - "100 rolls do not grow dice node count"
      - "runtime captures for 1,2,3,5 and rolling state"
    stop_if:
      - "Need files outside allowed_files."
      - "Compatibility rendererで安定表示できない。"
    receipt:
      result: done
      summary: "640x280透明SubViewport、最大5個pool、6面21pip実3D、logic駆動姿勢、1/2/3/5配置、rolling/settling/locked、早止めhighlightを実装し通常・イベント・RISKへ共通接続。"
      changed_files:
        - "scripts/game/dice_presentation_3d.gd"
        - "scripts/game/dice_presentation_3d.gd.uid"
        - "scripts/app/main.gd"
        - "tests/run_tests.gd"
        - "docs/IMPLEMENTATION_NOTES.md"
        - "docs/reference/runtime-premium-dice-*.png"
      commands:
        - cmd: "Godot 4.7 unit face/layout tests"
          status: pass
        - cmd: "EARLY_STOP / STOP_ALL / EXTRA1-3-5 / RISK / M3 / M4A"
          status: pass
        - cmd: "Compatibility renderer captures 1/2/3/5/rolling"
          status: pass
      known_polish:
        - "トレイが橙色で仮設感がある。"
        - "ダイスが小さく、盤面と情報階層もT006で調整する。"

  - id: T006
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: high
    objective: "カイロ盤面、ダイストレイ、解禁導線、情報階層をプレミアム品質へ磨き、必要素材を統合する。"
    allowed_files:
      - "scripts/app/main.gd"
      - "scripts/game/board_view.gd"
      - "scripts/game/dice_presentation_3d.gd"
      - "assets/art/ui/*"
      - "tests/run_tests.gd"
      - "README.md"
      - "docs/IMPLEMENTATION_NOTES.md"
      - "docs/reference/runtime-premium-ui-*.png"
      - "design-qa.md"
    verify:
      - "boss card + gauge, full minimap, enlarged neighborhood board, premium dice tray"
      - "one glance communicates NORMAL/DOUBLE CHANCE/DICE SLOT"
      - "risk tile and next stop are legible"
      - "dice are materially larger and tray no longer looks temporary"
      - "360x640 no clipping; primary roll and stop controls remain reachable"
      - "reference and runtime screenshot comparison"
      - "all unit and M0-M4A QA"
    stop_if:
      - "Need files outside allowed_files."
      - "参考画面との比較キャプチャが取れない。"
    receipt:
      result: done
      summary: "ボスカード+実ゲージ、独立ミニマップ、現在±5の大型11マス盤面、砂革3Dダイストレイ、非操作状態インジケーターへ再構成。360x640でP0-P2を修正しdesign QA passed。"
      changed_files:
        - "scripts/app/main.gd"
        - "scripts/game/board_view.gd"
        - "scripts/game/dice_presentation_3d.gd"
        - "docs/IMPLEMENTATION_NOTES.md"
        - "design-qa.md"
        - "docs/reference/runtime-premium-ui-*.png"
      commands:
        - cmd: "Reference/runtime screenshot comparison"
          status: pass
        - cmd: "Godot 4.7 unit suite"
          status: pass
        - cmd: "Dice controls/RISK/M3/M4A regression"
          status: pass
      residual_p3:
        - "専用立体石畳アート、個別item icon、角丸3D dice、革textureは後続候補。"

  - id: T999
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "仕様、実機画面、入力、保存、M0〜M4A回帰を監査しトランシェ完了を判定する。"
    inputs:
      - "All done task receipts"
      - "Godot 4.7 verification logs"
      - "Reference and runtime screenshots"
      - "Current dirty diff"
    constraints:
      - "Do not implement."
      - "必須Workerが残る場合はcompleteにしない。"
    expected_output:
      - "complete | not_complete"
      - "missing evidence"
      - "next task if not complete"
    receipt:
      result: complete
      decision: "complete"
      summary: "新ダイス状態遷移、改訂90マス、RISK、制御2.5D、プレミアムUI、v5保存、M3/M4A/早止め回帰を監査し、第一トランシェ完了。"
      evidence:
        - "Godot 4.7 unit suite failures=0"
        - "DICE_QA_DICE_PROGRESSION / STOP_ALL / EXTRA_DICE_CONTROLS passed"
        - "DICE_QA_RISK safe/challenge passed"
        - "DICE_QA_M3_ROUTES / M4A_HARDENING passed"
        - "runtime-premium-ui one/two/three/risk/rolling visually inspected"
        - "design-qa.md final result passed"
      residual_p3:
        - "角丸3Dダイスと固有材質"
        - "立体石畳パースアートと個別アイテムアイコン"
        - "音・振動の実機polish"
        - "イベントDICE_ADD_1の明示モーダルsmoke"

checks:
  dirty_fingerprint: "premium-dice-experience-complete-uncommitted"
  last_verification:
    result: pass
    task: "T999"
    commands:
      - "Godot 4.7 unit suite: failures=0"
      - "Progression/stop/extra/risk/M3/M4A QA: PASS"
      - "Premium UI comparison: PASS"
      - "Judge T999: complete"
