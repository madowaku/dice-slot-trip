    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "サイコロの転がり感を強化し、ロール中に左から1個ずつ目押し停止と全ダイス一括停止を併用できるようにする。通常1/3/5ダイスとM4A追加1/3/5ダイスへ共通適用する。"
    inputs:
      - "ステージ画面イメージ.png"
    allowed_files:
      - "scripts/app/main.gd"
      - "scripts/core/dice_logic.gd"
      - "tests/run_tests.gd"
      - "README.md"
      - "docs/IMPLEMENTATION_NOTES.md"
      - "docs/reference/runtime-m4a-dice-*.png"
    constraints:
