        - "Hardening normal_loop/warp_loop/reservation/no_repeat/rare55_45 all true"
        - "Dice stop and extra 1/3/5 controls passed"
        - "Seven RGB opaque 360x640 captures, black rows/cols 0"
        - "M0-M3 sequential regression passed"
      commands:
        - cmd: "Godot 4.7 tests/run_tests.gd"
          status: pass
        - cmd: "M4A / hardening / dice / M0-M3 QA"
          status: pass
        - cmd: "Pillow capture audit"
          status: pass
        - cmd: "git diff --check"
          status: pass

