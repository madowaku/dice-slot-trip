version: 2

goal:
  title: "DICE SLOT TRIP M4A イベント基盤"
  slug: "dice-slot-trip-m4a-event-foundation"
  kind: specific
  tranche: "代表10イベントと共通イベント基盤を実装し、保存復元・ボス引き継ぎ・追加ダイス・既存回帰を監査する"
  status: done

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true

agents:
  scout: installed
  worker: installed
  judge: installed

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: high
    objective: "M4A仕様と現行M3実装を照合し、最小変更面、保存移行、ダイス再利用、ボス引き継ぎ、テスト構造を特定する。"
    inputs:
      - "docs/M4A イベント基盤詳細仕様 v0.1.md"
      - "docs/カイロ用イベント30本v0.1.md"
      - "scripts/app/main.gd"
      - "scripts/core/dice_logic.gd"
      - "scripts/game/boss_system.gd"
      - "autoload/game_state.gd"
      - "autoload/save_manager.gd"
      - "tests/run_tests.gd"
    constraints:
      - "Read-only."
      - "既存M0〜M3のプレイフィールを維持する。"
      - "仕様の代表10イベントを漏れなくマッピングする。"
    expected_output:
      - "M4Aファイルマップ"
      - "イベント／報酬データ設計"
      - "保存マイグレーション案"
      - "検証可能なWorker境界"
    receipt:
      result: done
      summary: "M3を大規模改修せず、EventSystemとRewardResolverをEVENT着地へ挿入できる。10イベントJSON、GameState v3、追加ダイス再利用、単一ボス引き継ぎ判断、resolution_id冪等性が最小変更面。"
      evidence:
        - "scripts/app/main.gd"
        - "scripts/core/dice_logic.gd"
        - "autoload/game_state.gd"
        - "autoload/save_manager.gd"
        - "docs/M4A イベント基盤詳細仕様 v0.1.md"
      risks:
        - "CAI-E03はM4A詳細仕様の確定遭遇を優先する。"
        - "追加5ダイスは移動用3個選択を使わず、5個全体の役種類を集計する。"
        - "M4Bキャラクター固有能力と20アイテム完全実装を混在させない。"
      spawned_tasks:
        - T002

  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Scout結果を監査し、M4Aを安全に完成できるWorkerタスクと検証条件を決定する。"
    inputs:
      - "T001 receipt"
      - "M4A specification"
    constraints:
      - "Do not implement."
      - "代表10イベントと共通基盤を完成条件から外さない。"
    expected_output:
      - "Decision"
      - "Exact Worker objective"
      - "allowed_files"
      - "verify"
      - "stop_if"
    receipt:
      result: done
      decision: "APPROVE。EventSystem、RewardResolver、GameState v3、Main接続を一つのデータ駆動Workerタスクとして実装可能。"
      next_allowed_task: T003
      worker_objective: "代表10イベント、地区抽選、重複抑制、到着ロール不変、二択、追加1/3/5ダイス、共通報酬、単一ボス引き継ぎ、中断復帰、DEBUG・QA・キャプチャを実装する。"
      deferred:
        - "残り20イベント"
        - "基本アイテム20個の完全固有効果"
        - "初期キャラクター4人の固有能力"

  - id: T003
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: high
    objective: "Judgeが定義したM4Aイベント基盤と代表10イベントを実装する。"
    inputs:
      - "docs/M4A イベント基盤詳細仕様 v0.1.md"
      - "docs/コイン・アイテム抽選・スキル回復 数値仕様 v0.1.md"
