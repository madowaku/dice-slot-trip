      - "Godot 4.7 verification logs"
      - "Runtime screenshots"
      - "Current dirty diff"
    constraints:
      - "Do not implement."
      - "必須Worker作業が残る場合はcompleteにしない。"
    expected_output:
      - "complete | not_complete"
      - "missing evidence"
      - "next task if not complete"
    receipt:
      result: complete
      summary: "52 unit、M4A 20/20、hardening、サイコロ停止、追加ダイス、M0-M3回帰、git diff check、7キャプチャを再監査しcomplete判定。"
      evidence:
