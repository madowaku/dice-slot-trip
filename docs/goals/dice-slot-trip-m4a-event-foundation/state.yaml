        - "docs/reference/runtime-m4a-extra.png"
        - "docs/reference/runtime-m4a-result.png"
        - "docs/reference/runtime-m4a-boss_handoff.png"
      verification:
        - "Godot 4.7 unit: 49 PASS"
        - "DICE_QA_M4A: checks=20 forced10=true passed=true"
        - "M0-M3 regression: all pass"
        - "git diff --check: pass"
        - "runtime M4A capture x5: result 0"
      commands:
        - cmd: "Godot 4.7 tests/run_tests.gd"
          status: pass
        - cmd: "DICE_QA_M4A=1"
          status: pass
        - cmd: "M0-M3 regression QA"
          status: pass
        - cmd: "Godot viewport capture x5"
          status: pass

  - id: T999
