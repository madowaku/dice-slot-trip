      - "M4A 20 acceptance checks and all 10 forced events"
      - "M0-M3 regression QA"
      - "Five runtime M4A captures"
      - "M4A報酬キー、最小アイテム抽選、SKILL_RECOVERが数値仕様に一致する"
    stop_if:
      - "Need files outside allowed_files."
      - "仕様上の重大な曖昧さがある。"
      - "Verification fails twice without a localized cause."
    receipt:
      result: done
      summary: "代表10イベント、地区抽選、重複抑制、到着ロール、二択、追加1/3/5ダイス、RewardResolver、ボス引き継ぎ、セーブv3、中断復帰、DEBUG、数値仕様を実装。"
      changed_files:
        - "data/events/cairo_m4a_events.json"
        - "scripts/game/event_system.gd"
        - "scripts/game/reward_resolver.gd"
        - "scripts/core/dice_logic.gd"
        - "autoload/game_state.gd"
        - "scripts/app/main.gd"
        - "tests/run_tests.gd"
        - "README.md"
        - "docs/IMPLEMENTATION_NOTES.md"
        - "docs/reference/runtime-m4a-opening.png"
