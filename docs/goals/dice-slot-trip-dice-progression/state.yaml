version: 2

goal:
  title: "DICE SLOT TRIP ダイス成長スライス"
  slug: "dice-slot-trip-dice-progression"
  kind: specific
  tranche: "1ダイス開始、アイテム/イベントで2・3ダイス解禁、3ダイスで役解禁、保存互換と回帰を監査する"
  status: done

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true

agents:
  scout: installed
  worker: installed
  judge: installed

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: high
    objective: "現行M4Aのダイス、イベント報酬、アイテムマス、保存移行、役判定を調査し、ダイス成長を安全に挿入する境界を決める。"
    inputs:
      - "scripts/app/main.gd"
      - "scripts/core/dice_logic.gd"
      - "scripts/game/event_system.gd"
      - "scripts/game/reward_resolver.gd"
      - "autoload/game_state.gd"
      - "tests/run_tests.gd"
      - "docs/コイン・アイテム抽選・スキル回復 数値仕様 v0.1.md"
    constraints:
      - "Read-only."
      - "M4Aのイベント報酬と追加ダイスを壊さない。"
      - "旧セーブは3ダイス解禁済みへ移行する。"
    expected_output:
      - "現行ダイス状態マップ"
      - "成長報酬の最小データ設計"
      - "役解禁条件"
      - "Worker allowed_filesとQA境界"
    receipt:
      result: done
      summary: "現行M4Aは1/3/5を既定UIにし、GameStateに成長状態がない。unlocked_dice_countを永続化し、タイトル新規のみ1、旧セーブは3へ移行、ITEM/EVENTのDICE_UNLOCKで最大3にするのが最小変更。"
      evidence:
        - "scripts/app/main.gd"
        - "autoload/game_state.gd"
        - "scripts/game/reward_resolver.gd"
        - "scripts/game/event_system.gd"
        - "tests/run_tests.gd"
      risks:
        - "reset_runは次旅でも進行を保持し、新規開始だけstart_new_gameで1にする。"
        - "M4A追加1/3/5ダイスと成長数を別概念として扱う。"
        - "旧v3セーブは3ダイス解禁済みへ移行する。"
      spawned_tasks:
        - T002

  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Scout結果を監査し、ダイス成長と役解禁を実装するWorker境界を決定する。"
    inputs:
      - "T001 receipt"
      - "dice progression objective"
    constraints:
      - "Do not implement."
      - "通常/イベント/追加ダイス回帰を必須にする。"
    expected_output:
      - "Decision"
      - "Exact Worker objective"
      - "allowed_files"
      - "verify"
      - "stop_if"
    receipt:
      result: done
      decision: "APPROVE。unlocked_dice_countを永続化し、明示的なstart_new_gameのみ1へ初期化。ITEM停止とデータ指定DICE_UNLOCKで2/3へ進め、3で役を解禁する。旧セーブは3へ移行し、M4A追加1/3/5は別概念として維持。"
      next_allowed_task: T003
      worker_objective: "ダイス成長、役解禁、v4保存移行、ITEM/EVENT報酬、DEBUG・QA・キャプチャを実装する。"

  - id: T003
    type: pm
    assignee: PM
    status: done
    reasoning_hint: high
    objective: "Judge承認済みのダイス成長、3ダイス役解禁、保存移行、DEBUG、QAを実装する。"
    allowed_files:
      - "autoload/game_state.gd"
      - "scripts/app/main.gd"
      - "scripts/core/dice_logic.gd"
      - "scripts/game/reward_resolver.gd"
      - "data/events/cairo_m4a_events.json"
      - "tests/run_tests.gd"
      - "README.md"
      - "docs/IMPLEMENTATION_NOTES.md"
      - "docs/reference/runtime-dice-progression-*.png"
    allowed_files:
      - "autoload/game_state.gd"
      - "scripts/app/main.gd"
      - "scripts/core/dice_logic.gd"
      - "scripts/game/reward_resolver.gd"
      - "data/events/cairo_m4a_events.json"
      - "tests/run_tests.gd"
      - "README.md"
      - "docs/IMPLEMENTATION_NOTES.md"
      - "docs/reference/runtime-dice-progression-*.png"
    verify:
      - "Godot 4.7 existing 52+ unit tests"
      - "new game=1, item/event 2→3, no role under3, role at3, cap, reset/save/migration"
      - "M4A extra1/3/5 and special 5 dice remain independent"
      - "M0-M4A regression and visual captures"
    stop_if:
      - "Need files outside allowed_files."
      - "M4A追加ダイスや目押し回帰を維持できない。"
      - "Verification fails twice without a localized cause."
    receipt:
      result: done
      summary: "新規1ダイス開始、ITEM/EVENT報酬の2/3段階解禁、3ダイス役解禁、v4保存と旧v3→3移行、既存QA fixtureを実装。参考画面に合わせ、数字ではなく黒い目を描く白いダイス面へ変更した。"
      changed_files:
        - "autoload/game_state.gd"
        - "scripts/app/main.gd"
        - "scripts/core/dice_logic.gd"
        - "scripts/game/reward_resolver.gd"
        - "data/events/cairo_m4a_events.json"
        - "tests/run_tests.gd"
        - "README.md"
        - "docs/IMPLEMENTATION_NOTES.md"
        - "docs/reference/runtime-dice-progression-*.png"
      commands:
        - cmd: "Godot 4.7 tests/run_tests.gd"
          status: pass
        - cmd: "DICE_QA_DICE_PROGRESSION"
          status: pass
        - cmd: "DICE_QA_STOP_ALL / EXTRA_DICE_CONTROLS"
          status: pass
        - cmd: "DICE_QA_M4A and M3 regression"
          status: pass
        - cmd: "Godot progression captures one/two/three"
          status: pass
      verification:
        - "fresh_one=true visible=1/2/3:true/true/true"
        - "roles=true/true save=true restore=true migration=true passed=true"
        - "52+ unit tests pass"
        - "Dice pip visual inspected"

  - id: T999
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "ダイス成長、役解禁、保存移行、M4A/M0-M3回帰、実画面証跡を監査する。"
    inputs:
      - "All done task receipts"
      - "Godot 4.7 verification logs"
      - "Runtime screenshots"
      - "Current dirty diff"
    constraints:
      - "Do not implement."
      - "必須Worker作業が残る場合はcompleteにしない。"
    expected_output:
      - "complete | not_complete"
      - "missing evidence"
      - "next task if not complete"
    receipt:
      result: complete
      decision: "complete"
      summary: "新規1ダイス、ITEM/EVENT報酬2→3、3ダイス役解禁、v4保存、旧v3移行、目押し/一括停止/M4A追加ダイス/M0-M3回帰を最終監査しcomplete。"
      evidence:
        - "tests/run_tests.gd all PASS"
        - "DICE_QA_DICE_PROGRESSION passed=true"
        - "DICE_QA_STOP_ALL / EXTRA_DICE_CONTROLS / ONE_DIE / EARLY_STOP passed"
        - "DICE_QA_M4A checks=20 forced10=true passed=true"
        - "DICE_QA_M3_SMOKE and M3 routes passed"
        - "runtime-dice-progression-one/two/three.png visually inspected"
      commands:
        - cmd: "Godot 4.7 tests/run_tests.gd"
          status: pass
        - cmd: "DICE_QA_DICE_PROGRESSION=1"
          status: pass
        - cmd: "DICE_QA_M4A / M3 / dice controls / regression"
          status: pass
        - cmd: "Godot 4.7 default headless"
          status: pass

checks:
  dirty_fingerprint: "m4a-complete-dice-progression-start"
  last_verification:
    result: pass
    task: "Dice progression"
    commands:
      - "Godot 4.7 unit: all PASS"
      - "DICE_QA_DICE_PROGRESSION: PASS"
      - "M4A/M3/M0 regression: PASS"
      - "Judge T999 re-audit: complete"
