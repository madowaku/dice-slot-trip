version: 2

goal:
  title: "DICE SLOT TRIP M3 ループボス交流"
  slug: "dice-slot-trip-m3-loop-boss"
  kind: specific
  tranche: "遭遇、交流、ゲット、図鑑、次個体、保存復元をプレイ可能にし、M3受け入れ条件を検証する"
  status: done

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true

agents:
  scout: installed
  worker: installed
  judge: installed

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: high
    objective: "既存M0〜M2の状態・セーブ形式・UI導線・テストを調べ、M3の互換性リスクと最小変更面を特定する。"
    inputs:
      - "autoload/game_state.gd"
      - "autoload/save_manager.gd"
      - "scripts/app/main.gd"
      - "scripts/core/dice_logic.gd"
      - "scripts/game/board_model.gd"
      - "tests/run_tests.gd"
    constraints:
      - "Read-only."
      - "既存プレイフィールを変えない。"
    expected_output:
      - "M3実装候補のファイルマップ"
      - "旧セーブ移行方針"
      - "テスト可能な受け入れ条件"
    receipt:
      result: done
      summary: "M3はBossSystemの純粋ロジック、GameStateの永続状態、Mainの短いモーダル、既存testsの4面へ限定する。旧boss_bondは初期個体へ移し、未存在フィールドは眠そうなスフィンクスを生成する。"
      evidence:
        - "autoload/game_state.gd"
        - "autoload/save_manager.gd"
        - "scripts/app/main.gd"
        - "tests/run_tests.gd"
      spawned_tasks:
        - T002

  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Scout結果とM3仕様から、安全で検証可能なWorkerタスクを決定する。"
    inputs:
      - "T001 receipt"
      - "M3 user specification"
    constraints:
      - "Do not implement."
      - "戦闘化や過剰な汎用化を避ける。"
    expected_output:
      - "Decision"
      - "Exact Worker objective"
      - "allowed_files"
      - "verify"
      - "stop_if"
    receipt:
      result: done
      decision: "M3をBossSystem純粋ロジック、個体JSON、GameState移行、動的モーダル/図鑑、QAの6面に限定して実装する。既存盤面・ダイス・早止めは維持する。"
      next_allowed_task: T003
      worker_objective: "カイロ3個体、遭遇・救済・交流・ゲット・図鑑・次個体・旧セーブ・DEBUG・自動QA・4キャプチャを実装する。"

  - id: T003
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: high
    objective: "Judgeが決めたM3ループボス交流スライスを実装する。"
    allowed_files:
      - "data/bosses/cairo_sphinxes.json"
      - "scripts/game/boss_system.gd"
      - "autoload/game_state.gd"
      - "autoload/save_manager.gd"
      - "scripts/app/main.gd"
      - "tests/run_tests.gd"
      - "README.md"
      - "docs/IMPLEMENTATION_NOTES.md"
      - "docs/reference/runtime-m3-*.png"
    verify:
      - "Godot 4.7 M3 tests and M0-M2 regressions"
      - "M3 operation smokes for interaction, get, next journey, stage selection"
      - "Game, encounter, get, encyclopedia captures"
    stop_if:
      - "Need files outside allowed_files."
      - "戦闘仕様を導入する必要がある。"
      - "Verification fails twice without a localized cause."
    receipt:
      result: done
      changed_files:
        - "data/bosses/cairo_sphinxes.json"
        - "scripts/game/boss_system.gd"
        - "autoload/game_state.gd"
        - "autoload/save_manager.gd"
        - "scripts/app/main.gd"
        - "tests/run_tests.gd"
        - "README.md"
        - "docs/IMPLEMENTATION_NOTES.md"
        - "docs/reference/runtime-m3-game.png"
        - "docs/reference/runtime-m3-encounter.png"
        - "docs/reference/runtime-m3-get.png"
        - "docs/reference/runtime-m3-encyclopedia.png"
      commands:
        - cmd: "Godot 4.7 editor parse"
          status: pass
        - cmd: "Godot 4.7 tests/run_tests.gd"
          status: pass
        - cmd: "DICE_QA_M3_SMOKE"
          status: pass
        - cmd: "DICE_QA_EARLY_STOP / ONE_DIE / FIVE_DICE / SAVE_RELOAD"
          status: pass
        - cmd: "Godot Viewport M3 capture x4"
          status: pass
      summary: "カイロ3個体、遭遇救済、交流モーダル、ゲット、図鑑、次個体、v1移行、DEBUG、14条件QAを実装。TRIPLEは着地マスを問わず一度だけ確定交流し、PAIRは交流時だけ一回加算する。"

  - id: T999
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "M3が、交流→ゲット→図鑑→次個体→保存復元の一連の体験を満たすか監査する。"
    inputs:
      - "All done task receipts"
      - "Godot 4.7 verification logs"
      - "Runtime screenshots"
      - "Current dirty diff"
    constraints:
      - "Do not implement."
      - "必要なWorker作業が残る場合はcompleteにしない。"
    expected_output:
      - "complete | not_complete"
      - "missing evidence"
      - "next task if not complete"
    receipt:
      result: complete
      summary: "T006再監査で完了判定。30 unit tests、M3 route統合QA、M3 smoke、5ダイス本番モーダル回帰、全個体図鑑、未登録シルエット、控えめな遭遇SE、最新キャプチャを確認した。"
      evidence:
        - "DICE_QA_M3_ROUTES normal=true next_ui=true next_save=true stage_ui=true stage_save=true all_cards=true passed=true"
        - "DICE_QA_M3_SMOKE passed=true"
        - "tests/run_tests.gd failures=0"
        - "docs/reference/runtime-m3-encounter.png"
        - "docs/reference/runtime-m3-get.png"
        - "docs/reference/runtime-m3-encyclopedia.png"

  - id: T004
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "最終監査の不足（次個体の保存、未登録シルエット、100%ゲージ演出、実モーダル証拠）を補い再監査する。"
    allowed_files:
      - "autoload/game_state.gd"
      - "scripts/app/main.gd"
      - "tests/run_tests.gd"
      - "docs/reference/runtime-m3-*.png"
      - "README.md"
      - "docs/IMPLEMENTATION_NOTES.md"
    verify:
      - "Stage select return then next Cairo journey uses a fresh individual"
      - "Unregistered bestiary cards render a silhouette"
      - "100% gauge visibly increments before get result"
      - "Actual encounter/get modal captures"
      - "Godot 4.7 tests and M3 smoke"
    stop_if:
      - "Verification fails twice without a localized cause."
    receipt:
      result: done
      summary: "次個体をゲット直後に保存して両方の退出経路で再利用を防止し、未登録図鑑シルエット、交流100%の段階表示、本番モーダル由来の画面証跡を追加した。"
      evidence:
        - "scripts/app/main.gd"
        - "docs/reference/runtime-m3-encounter.png"
        - "docs/reference/runtime-m3-get.png"
        - "docs/reference/runtime-m3-encyclopedia.png"
      verification:
        - "Godot 4.7 parse: pass"
        - "tests/run_tests.gd: 29 PASS"
        - "DICE_QA_M3_SMOKE: pass (stage_select_loads_next=true)"

  - id: T005
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "追加のカイロ資料をM3範囲へ反映し、90マスにボス気配マスを追加して、気配上昇と通常マス遭遇への期待導線を盤面で確認可能にする。"
    inputs:
      - "docs/マス種類と役割表v0.1.md"
      - "docs/カイロ用イベント30本v0.1.md"
      - "docs/基本アイテム20個 v0.1.md"
      - "docs/初期キャラクター4人 v0.1.md"
    allowed_files:
      - "scripts/game/board_model.gd"
      - "scripts/game/board_view.gd"
      - "scripts/app/main.gd"
      - "tests/run_tests.gd"
      - "README.md"
      - "docs/IMPLEMENTATION_NOTES.md"
      - "docs/reference/runtime-m3-*.png"
    constraints:
      - "M3ではボス気配マスのみ実装し、イベント30本とアイテム20個の完全実装はM4以降に保留する。"
      - "90マス、既存役、早止め、保存互換を維持する。"
      - "TRIPLEの確定遭遇を重複させない。"
    verify:
      - "90マスの新しい分布とボス気配マスの動作"
      - "M3 smokeとM0-M2回帰"
      - "ゲーム画面の盤面キャプチャ"
    stop_if:
      - "既存のセーブ形式を破壊する必要がある。"
      - "Verification fails twice without a localized cause."
    receipt:
      result: done
      summary: "追加資料を読み、M3範囲として4つのボス気配マス、足跡表示、気配+2の停止効果を実装した。イベント30本・アイテム20個・4人固有能力は次スライスの正式入力として記録した。TRIPLE導入後に停止していた5ダイスQAも本番交流モーダルを自動操作して完走するよう補正した。"
      changed_files:
        - "scripts/game/board_model.gd"
        - "scripts/game/board_view.gd"
        - "scripts/app/main.gd"
        - "tests/run_tests.gd"
        - "README.md"
        - "docs/IMPLEMENTATION_NOTES.md"
        - "docs/reference/runtime-m3-game.png"
      verification:
        - "Godot 4.7 parse: pass"
        - "tests/run_tests.gd: 30 PASS"
        - "DICE_QA_M3_SMOKE: pass"
        - "DICE_QA_EARLY_STOP: pass"
        - "DICE_QA_ONE_DIE: pass"
        - "DICE_QA_FIVE_DICE: pass with production encounter modal"
        - "DICE_QA_SAVE_RELOAD: pass"
        - "runtime-m3-game.png inspected: boss scent footprint visible"

  - id: T006
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: high
    objective: "最終Judgeが残した図鑑全個体表示、実モーダル経路QA、通常マス遭遇統合QA、控えめな遭遇SEを実装する。"
    allowed_files:
      - "scripts/app/main.gd"
      - "tests/run_tests.gd"
      - "README.md"
      - "docs/IMPLEMENTATION_NOTES.md"
      - "docs/reference/runtime-m3-*.png"
    verify:
      - "同じ定義IDの複数individual_idが全カード表示される"
      - "通常マス着地から本番交流モーダルが一度開く"
      - "get modalのnext_tripとstage_selectを実際に押し、保存済み次個体と画面遷移を確認"
      - "Godot 4.7 full regression and final captures"
    stop_if:
      - "Verification fails twice without a localized cause."
    receipt:
      result: done
      summary: "図鑑を登録individual全件表示へ変更し、未登録定義だけをシルエット化。通常マス実着地、本番交流、実結果ボタン2経路、次個体の保存、同種複数カードをQAで操作確認した。遭遇時に-18dBの短い2音SEを追加した。"
      changed_files:
        - "scripts/app/main.gd"
        - "docs/reference/runtime-m3-encounter.png"
        - "docs/reference/runtime-m3-encyclopedia.png"
      verification:
        - "Godot 4.7 parse: pass"
        - "tests/run_tests.gd: 30 PASS"
        - "DICE_QA_M3_SMOKE: pass"
        - "DICE_QA_M3_ROUTES: normal=true next_ui=true next_save=true stage_ui=true stage_save=true all_cards=true passed=true"
        - "DICE_QA_FIVE_DICE: pass through production encounter modal"
        - "Actual encounter and encyclopedia captures inspected"

checks:
  dirty_fingerprint: "m0-m2-uncommitted-prototype"
  last_verification:
    result: pass
    task: "M3"
    commands:
      - "Godot 4.7 tests: 30 PASS"
      - "DICE_QA_M3_SMOKE: PASS"
      - "DICE_QA_M3_ROUTES: PASS"
      - "DICE_QA_EARLY_STOP / ONE_DIE / FIVE_DICE / SAVE_RELOAD: PASS"
      - "Judge T006 re-audit: complete"
