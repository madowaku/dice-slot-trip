version: 2

goal:
  title: "DICE SLOT TRIP 縦切りプロトタイプ"
  slug: "dice-slot-trip-vertical-slice"
  kind: specific
  tranche: "仕様と環境を確認し、M0〜M2を実装・検証してM3へ渡せる縦切りを作る"
  status: done

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true

agents:
  scout: installed
  worker: installed
  judge: installed

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: medium
    objective: "仕様書を読み、必須要件、MVP受け入れ条件、曖昧点、低リスクな面白さ改善案を整理する。"
    inputs:
      - "Dice_Slot_Trip_仕様書.md"
      - "タイトル画面イメージ.png"
      - "ステージ選択画面イメージ.png"
      - "ステージ画面イメージ.png"
    constraints:
      - "Read-only."
      - "ゲームの柱とやらない方向を維持する。"
    expected_output:
      - "要件マップ"
      - "テスト可能な受け入れ条件"
      - "M0〜M2を邪魔しない改善案"
    receipt:
      result: done
      note: "notes/T001-spec-map.md"
      summary: "3ダイス・90マス閉ループ・静かな周回と短い高揚を中心に、M0〜M2の実装条件とテスト観点を確定した。"

  - id: T002
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: medium
    objective: "ローカル環境、Godot MCP、利用可能バージョン、リポジトリ状態、検証手段を確認する。"
    inputs:
      - "C:/Dev/Projects/dice-slot-trip"
      - "C:/Dev/Tools/godot-mcp"
    constraints:
      - "Read-only."
      - "環境差分を隠さない。"
    expected_output:
      - "Godotバージョン"
      - "実行・デバッグ・画面確認手段"
      - "初期化時の注意点"
    receipt:
      result: done
      summary: "Godot MCPはバージョン非依存で、公式Godot 4.7 stableを導入しCodex設定のGODOT_PATHを更新した。現在プロセスは再起動まで4.6.1だが、4.7 consoleで直接検証可能。プロジェクトとGit、Android SDK・export templatesは未準備。"
      evidence:
        - "Godot MCP get_godot_version: 4.6.1.stable.official.14d19694e"
        - "Godot 4.7 direct: C:/Dev/Tools/Godot-4.7-stable/Godot_v4.7-stable_win64_console.exe"
        - "Godot 4.7 version: 4.7.stable.official.5b4e0cb0f"
        - "Codex config GODOT_PATH updated; backup: C:/Users/hiro/.codex/config.toml.godot-4.7-backup"
        - "Godot MCP list_projects: []"
        - "C:/Dev/Tools/godot-mcp"
      constraints_found:
        - "現在のMCPプロセスはCodex再起動まで4.6.1を保持するため、このセッションの4.7検証はconsole直接実行を使う。"
        - "Android出力検証にはSDKとexport templatesが必要。"
        - "画面キャプチャはOS/Browser系ツールで補完する。"

  - id: T003
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "仕様と環境のScout結果から、最初の安全なM0〜M2 Workerタスクを確定する。"
    inputs:
      - "T001 receipt"
      - "T002 receipt"
    constraints:
      - "Do not implement."
      - "参照画像とデータ駆動要件を維持する。"
    expected_output:
      - "Decision"
      - "Exact Worker objective"
      - "allowed_files"
      - "verify"
      - "stop_if"
    receipt:
      result: done
      decision: "Godot 4.7の直接実行を検証軸にし、まずM0〜M2を一つの縦切りとして実装する。参照画像はdocs/referenceへ保存し、最終画面では文字なし生成背景とGodot Control UIを分離する。"
      next_allowed_task: T004
      worker_objective: "縦画面プロジェクト、画面遷移、90マスPath2D盤面、3/1/5ダイス、全役、主要着地マス、デバッグ固定出目、オートセーブ骨格を実装する。"
      verify: "Godot 4.7 headless parse、ロジックテスト、起動ログ、720x1280表示、20連続ロールと89→0周回。"

  - id: T004
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: high
    objective: "Judgeが確定したM0〜M2の第一実装スライスを実装する。"
    allowed_files:
      - "project.godot"
      - ".gitignore"
      - "README.md"
      - "assets/**"
      - "autoload/**"
      - "data/**"
      - "scenes/**"
      - "scripts/**"
      - "tests/**"
      - "docs/reference/**"
      - "docs/IMPLEMENTATION_NOTES.md"
    verify:
      - "Godot 4.7 --headless --path . --editor --quit"
      - "Godot 4.7 --headless --path . --script tests/run_tests.gd"
      - "Godot 4.7 --path . --editor or project run with captured output"
      - "720x1280 screenshot inspection"
    stop_if:
      - "Need files outside allowed_files."
      - "仕様の柱を変える必要がある。"
      - "検証が2回失敗し、原因を局所化できない。"
    receipt:
      result: done
      changed_files:
        - "project.godot"
        - "autoload/game_state.gd"
        - "autoload/save_manager.gd"
        - "scripts/core/dice_logic.gd"
        - "scripts/game/board_model.gd"
        - "scripts/game/board_view.gd"
        - "scripts/app/main.gd"
        - "scenes/app/Main.tscn"
        - "data/stages/cairo_hourglass.json"
        - "data/characters/characters.json"
        - "tests/run_tests.gd"
        - "README.md"
        - "docs/IMPLEMENTATION_NOTES.md"
        - "docs/reference/*.png"
      commands:
        - cmd: "Godot 4.7 --headless --path . --editor --quit"
          status: pass
        - cmd: "Godot 4.7 --headless --path . --script tests/run_tests.gd"
          status: pass
        - cmd: "Godot 4.7 --headless --path . --quit-after 180"
          status: pass
      summary: "M0〜M2のプレイ可能版を実装。タイトルからゲームへ遷移し、90マスPath2D、3/1/5ダイス、5役、8種マス、周回、気配、旅メモ、スタンプ、保存、デバッグ固定出目が動作する。"

  - id: T005
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "選定されたビジュアル方向に沿って、生成画像・マップ・スプライトをGodotへ差し替え可能な形で組み込む。"
    allowed_files:
      - "assets/art/**"
      - "scripts/app/main.gd"
      - "scripts/game/board_view.gd"
      - "scripts/game/board_view.gd"
      - "docs/IMPLEMENTATION_NOTES.md"
      - "README.md"
    verify:
      - "生成画像の寸法・形式を確認する"
      - "透明素材のalphaと四隅を確認する"
      - "Godot 4.7で再インポート・起動する"
      - "720x1280画面をキャプチャして参照画像と比較する"
    stop_if:
      - "ビジュアル方向が未確定。"
      - "必要な画像生成物を検証できない。"
    receipt:
      result: done
      changed_files:
        - "assets/art/backgrounds/cairo-board.png"
        - "assets/art/characters/relaxed-traveler.png"
        - "assets/art/bosses/sleepy-sphinx.png"
        - "assets/art/**/*.prompt.txt"
        - "scripts/app/main.gd"
        - "scripts/game/board_view.gd"
      commands:
        - cmd: "remove_chroma_key.py for traveler and sphinx"
          status: pass
        - cmd: "Pillow dimensions, alpha mode and transparent corners"
          status: pass
        - cmd: "Godot 4.7 asset import and game-state headless run"
          status: pass
        - cmd: "Windows screenshots at 360x640 physical / 720x1280 logical"
          status: pass
        - cmd: "DICE_QA_EARLY_STOP interaction smoke"
          status: pass
      summary: "生成カイロ背景、旅人、スフィンクスを組み込み、透明素材を検証。ロール中の追加タップで左から早止めでき、放置時は自動停止する目押し風操作を追加した。"

  - id: T999
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "M0〜M2の実装と検証が、仕様書およびユーザーの元の依頼を満たすか監査する。"
    inputs:
      - "All done task receipts"
      - "Last verification"
      - "Current project tree"
      - "Godot debug output"
      - "Rendered screenshots"
    constraints:
      - "Do not implement."
      - "必要なWorker作業が残る場合はcompleteにしない。"
    expected_output:
      - "complete | not_complete"
      - "missing evidence"
      - "next task if not complete"
    receipt:
      result: complete
      decision: "complete"
      summary: "M0〜M2の第一実装スライスを監査。Godot 4.7 parse・ロジック18件・早止め・1ダイス・5ダイス・保存再読込・画面キャプチャ・Git初期化を確認し、残るM3以降は次トランシェへ分離する。"
      evidence:
        - "T004 receipt"
        - "T005 receipt"
        - "T006 receipt"
        - "docs/reference/runtime-title.png"
        - "docs/reference/runtime-stage-select.png"
        - "docs/reference/runtime-character-select.png"
        - "docs/reference/runtime-game-neighborhood.png"

  - id: T006
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "最終監査で見つかったM0〜M2の不足と検証証拠を補う。"
    allowed_files:
      - ".git/**"
      - "scripts/app/main.gd"
      - "tests/**"
      - "README.md"
      - "docs/IMPLEMENTATION_NOTES.md"
      - "docs/reference/runtime-*.png"
    verify:
      - "git status succeeds"
      - "DebugPanel exposes all five roles"
      - "Godot 4.7 one-die and five-dice interaction smoke tests"
      - "Godot 4.7 save/reload smoke test"
      - "Persistent 720x1280 logical screen captures"
    stop_if:
      - "Verification fails twice without a localized cause."
    receipt:
      result: done
      changed_files:
        - "scripts/app/main.gd"
        - "scripts/game/board_view.gd"
        - "tests/run_tests.gd"
        - "docs/IMPLEMENTATION_NOTES.md"
        - "docs/reference/runtime-*.png"
        - ".git/"
      commands:
        - cmd: "git init; git status --short"
          status: pass
        - cmd: "Godot 4.7 --headless --script tests/run_tests.gd"
          status: pass
        - cmd: "DICE_QA_EARLY_STOP"
          status: pass
        - cmd: "DICE_QA_ONE_DIE"
          status: pass
        - cmd: "DICE_QA_FIVE_DICE"
          status: pass
        - cmd: "DICE_QA_SAVE_RELOAD"
          status: pass
        - cmd: "Godot Viewport capture: title/stage/character/game"
          status: pass
      summary: "Git初期化、全役のDEBUG固定出目、1/5ダイスと保存の操作スモーク、永続キャプチャを追加。ユーザーフィードバックにより中央を現在地周辺の拡大盤面、上部を全体ミニマップへ変更した。"

checks:
  dirty_fingerprint: "git-initialized-uncommitted-prototype"
  last_verification:
    result: pass
    task: T006
    commands:
      - "Godot 4.7 editor parse"
      - "Godot 4.7 logic tests"
      - "Godot 4.7 interaction smokes"
      - "Godot Viewport captures"
