version: 2

goal:
  title: "TOURMAP-03A マップ上1ダイス往復"
  slug: "dice-slot-trip-tourmap-03a-map-die"
  kind: specific
  tranche: "Tourism 1-dieのトレイ→地図→結果強調→トレイ往復を既存ロジック非変更で完成させる"
  status: done

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true

agents:
  scout: installed
  worker: installed
  judge: installed

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: high
    objective: "既存2.5Dダイス、早止め、音、入力、Tourismレイアウト、保存復元を対応付け、1ダイスMap overlayの最小安全統合点を決める。"
    inputs:
      - "scripts/game/dice_presentation_3d.gd"
      - "scripts/game/dice_audio_controller.gd"
      - "scripts/game/tourism_map_view.gd"
      - "scripts/app/main.gd"
      - "autoload/game_state.gd"
      - "tests/run_tests.gd"
    constraints:
      - "Read-only; do not implement."
      - "Do not include 2/3/5 dice or gameplay rule changes."
    expected_output:
      - "call flow and ownership map"
      - "safe scene/script boundary"
      - "landing-zone geometry and input risks"
      - "interruption and verification plan"
    receipt:
      decision: "approve-with-boundary-clarification"
      summary: "Tourism 1-dieはMainのpresentation分岐と恒久Overlayで安全に統合可能。Overlayは値・役・報酬を所有せず、既存Mainを唯一の結果所有者にする。"
      evidence:
        - "main.gd _on_roll_pressed -> _animate_dice_roll -> _resolve_roll が既存の一意な処理経路"
        - "dice_presentation_3d.gd は固定5-node poolと面姿勢・settleを再利用可能"
        - "dice_audio_controller.gd は既存単一poolを共有し、新規AudioPlayer生成不要"
        - "tourism_map_view.gd map_dice_reserved_rect はprops回避済みだがtile/player非衝突検査が必要"
      boundary_issue: "現行_resolve_rollは結果確定・移動・報酬・保存が一体で、STOPPING以降のdurableな途中復帰には追加transaction設計が必要。"

  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Scout証拠から03Aの実装境界、allowed_files、state ownership、必須QAを決定する。"
    inputs:
      - "T001 receipt"
      - "goal.md"
    constraints:
      - "Do not implement."
    expected_output:
      - "approve | revise | reject"
      - "exact Worker task, allowed_files, verify, stop_if"
    receipt:
      decision: "approve-with-revised-recovery-boundary"
      summary: "03Aは既存_resolve_rollより前で完結するpresentation-only状態機械とし、durableな途中transactionは03B候補へ延期する。"
      allowed_files:
        - "scripts/game/map_dice_overlay.gd"
        - "scripts/game/map_dice_overlay.gd.uid"
        - "scripts/game/dice_presentation_3d.gd"
        - "scripts/game/tourism_map_view.gd"
        - "scripts/app/main.gd"
        - "tests/run_tests.gd"
      invariants:
        - "Mainだけが値、早止め、役、移動、報酬、commitを所有する"
        - "Overlayは恒久instanceで、RNG・save・gameplayを持たない"
        - "RESULT_HOLDとRETURNを終えてから_resolve_rollへ渡す"
        - "Classicと2/3/5ダイスは既存tray経路を維持する"
      deferred: "アプリ強制終了をまたぐSTOPPING以降のdurable復帰は、resolve transaction分割が必要なため03A対象外。"

  - id: T003
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: high
    objective: "Judge承認境界内でTourism 1-die往復と到達先強調を実装する。"
    inputs:
      - "T002 decision"
    constraints:
      - "Classic behavior and dice/gameplay logic remain unchanged."
    allowed_files:
      - "scripts/game/map_dice_overlay.gd"
      - "scripts/game/map_dice_overlay.gd.uid"
      - "scripts/game/dice_presentation_3d.gd"
      - "scripts/game/tourism_map_view.gd"
      - "scripts/app/main.gd"
      - "tests/run_tests.gd"
    verify:
      - "Godot headless editor parse/import"
      - "tests/run_tests.gd full suite"
      - "Tourism early-stop and auto-stop runtime smoke"
      - "Classic runtime regression"
      - "20-roll node/audio receipt stability"
      - "360x640 idle/rolling/result capture"
      - "git diff --check"
    stop_if:
      - "Need 2/3/5-dice support to make 1-die work."
      - "Need gameplay/save migration beyond approved recovery fields."
      - "Need files outside allowed_files."
      - "Verification fails twice for the same cause."
    receipt:
      decision: "implemented"
      files:
        - "scripts/game/map_dice_overlay.gd"
        - "scripts/game/map_dice_overlay.gd.uid"
        - "scripts/game/dice_presentation_3d.gd"
        - "scripts/game/tourism_map_view.gd"
        - "scripts/app/main.gd"
        - "tests/run_tests.gd"
      changed_files:
        - "scripts/game/map_dice_overlay.gd"
        - "scripts/game/map_dice_overlay.gd.uid"
        - "scripts/game/dice_presentation_3d.gd"
        - "scripts/game/tourism_map_view.gd"
        - "scripts/app/main.gd"
        - "tests/run_tests.gd"
      commands:
        - "Godot --headless --path . --script tests/run_tests.gd"
        - "DICE_QA_TOURMAP_DIE=1 Godot --headless --path ."
        - "DICE_QA_ONE_DIE=1 DICE_BOARD_VIEW=classic Godot --headless --path ."
        - "CLEAN/LAP-LANDMARK/RISK/TOURMAP/M3/M4A runtime QA commands"
        - "DICE_QA_CAPTURE_TOURMAP_DIE=idle|rolling|result Godot --path ."
        - "git diff --check"
      summary:
        - "Tourism+1ダイスのみ恒久overlayへpresentation routing"
        - "時間基準のlaunch arc、one-shot map-wide早止め、result hold、destination highlight、returnを既存resolve前に完了"
        - "入力遮断は_inputで処理し、マップ表示はCompatibility安定性のため通常Canvasの2.5D billboardへ合成"
        - "固定DEBUG出目は未commit中断時に復元"
        - "Classicと2/3/5、GameState、SaveManager、audio/gameplayロジックは未変更"
      verification:
        - "run_tests.gd failures=0"
        - "Tourism 20 rolls: early=true visible_stop=true bounded=true audio=true idle=true no_commit=true"
        - "Classic one die passed=true"
        - "CLEAN/LAP-LANDMARK/RISK/TOURMAP/M3/M4A passed=true"
        - "360x640 idle/rolling/result captures created"
        - "git diff --check passed"
      captures:
        - "notes/tourmap03a-idle-proof.jpg"
        - "notes/tourmap03a-rolling-proof.jpg"
        - "notes/tourmap03a-result-proof.jpg"
      residual:
        - "durable app-kill resume after STOPPING is deferred to a transaction-focused follow-up"
        - "M4A standalone smoke still reports its pre-existing exit-time leak warning while passing"

  - id: T999
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "TOURMAP-03Aを体験、ロジック一意性、入力、中断、360x640、20回疲労、全回帰で最終監査する。"
    inputs:
      - "All receipts"
      - "Fresh captures and QA"
      - "Current diff"
    constraints:
      - "Do not implement."
    expected_output:
      - "complete | not_complete"
      - "missing evidence"
      - "residual risks and next task"
    receipt:
      decision: "complete"
      summary:
        - "Tourism+1のみoverlay、Classic/複数ダイス既存経路を確認"
        - "可視2.5D billboardは1ダイスlock時に即停止しSTOPPINGへ遷移"
        - "結果保持と帰還後にのみ既存_resolve_rollへ進む"
        - "20回QAでpresentation=1、dice pool=5、audio pool=9、no_commit=true"
        - "360x640 idle/rolling/result proofは全画面正常、到達先+4表示正常"
      missing_evidence: []
      residual_risks:
        - "可視マップダイスはCompatibility安定性を優先したCanvas製2.5D表現で、実3D mesh合成は後続fidelity課題"
        - "STOPPING以降のアプリ強制終了をまたぐdurable復帰は後続transactionスライスへ延期"
        - "M4A standalone終了時リーク警告は既存課題"

checks:
  dirty_fingerprint: "At goal start tracked tree is clean at 75ef82d; existing user specs and unrelated generated imports remain untracked and must stay untouched."
  last_verification:
    result: pass
    task: T001
    evidence:
      - "Unit failures=0 before goal"
      - "CLEAN/LAP/LANDMARK/RISK/TOURMAP pass before goal"
