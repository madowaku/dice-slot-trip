version: 2

goal:
  title: "TOURMAP-01 観光マップ基盤"
  slug: "dice-slot-trip-tourism-map-01"
  kind: specific
  tranche: "Classicを残して市場地区のTourismMapViewをDEBUG切り替え可能にし、360x640と回帰を監査する"
  status: done

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true

agents:
  scout: installed
  worker: installed
  judge: installed

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: high
    objective: "現行BoardView、Main UI、景観、ダイス、QAとTOURMAP-01仕様を対応付け、ロジック非変更での最小統合点を決める。"
    inputs:
      - "User-provided 観光マップUI・マップ上ダイス演出仕様 v0.1"
      - "scripts/game/board_view.gd"
      - "scripts/app/main.gd"
      - "scripts/game/landmark_scenic_view.gd"
      - "scripts/game/dice_presentation_3d.gd"
      - "tests/run_tests.gd"
      - "docs/reference/runtime-clean-hud.png"
      - "ステージ画面2.png"
    constraints:
      - "Read-only; do not implement."
      - "CLEAN未コミット差分との重なりを明記する。"
      - "TOURMAP-03以降を混ぜない。"
    expected_output:
      - "Architecture map"
      - "Exact Worker boundary"
      - "Visual/layout contract"
      - "allowed_files / verify / stop_if"
    receipt:
      result: done
      summary: "TourismMapViewをBoardViewの表示専用subclassとして既存中央枠へ差し替えるのが最小安全。15マス[-4,+10]、曲線/遠近/到達範囲/拡大旅人を描き、Classicを既定で保持する。"
      evidence:
        - "scripts/game/board_view.gd:37-58,82-88,103-137"
        - "scripts/app/main.gd:387-397,647-654,724-728,1057-1066"
        - "scripts/game/board_model.gd:4,11-36"
        - "scripts/game/landmark_scenic_view.gd:4-21"
        - "scripts/game/dice_presentation_3d.gd:6-9,37-58,99-162"
        - "docs/reference/runtime-clean-hud.png"
      visual_contract:
        - "既存中央約263pxを維持し、背景→曲線道→到達範囲→マス→危険/名所→旅人の順に描く。"
        - "offset [-4,+10]をposmodし、current 89で90→01を自然に表示。"
        - "1ダイスは1..6を強調、2/3ダイスは表示範囲内の特殊目的地だけを強調。"
        - "市場±5のみ既存香辛料市場Lv0〜3景観を再利用。"
      proposed_allowed_files:
        - "scripts/game/tourism_map_view.gd"
        - "scripts/app/main.gd"
        - "tests/run_tests.gd"
        - "docs/reference/runtime-tourmap-*.png"
        - "docs/reference/runtime-tourmap-*.png.import"

  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Scout証拠からTOURMAP-01の安全な実装境界と受け入れ条件を決定する。"
    inputs:
      - "T001 receipt"
      - "Current dirty diff"
    constraints:
      - "Read-only; do not implement."
    expected_output:
      - "Decision"
      - "Exact Worker objective"
      - "allowed_files"
      - "verify"
      - "stop_if"
    receipt:
      result: done
      decision: "APPROVE。BoardView subclass、15 wrapped slots、Classic既定/idle切替、既存市場景観再利用に限定する。"
      next_allowed_task: T003
      constraints:
        - "360x250基準で全tile rectがbounds内、内部交差なし、2px以上の視覚gap。"
        - "offset -4..+10、current 89で86..90→01..10。"
        - "1ダイス+1..+6、2/3ダイスは表示内specialだけを強調。"
        - "minimapは常にClassic、未知modeはClassic。"
        - "TOURMAP-03ダイス、gameplay/save/CLEAN/FLOW、新規画像は対象外。"

  - id: T003
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "表示専用TourismMapView、15マス曲線遠近、到達範囲、市場景観、Classic既定のDEBUG/env切替、決定的QAを実装する。"
    allowed_files:
      - "scripts/game/tourism_map_view.gd"
      - "scripts/game/tourism_map_view.gd.uid"
      - "scripts/app/main.gd"
      - "tests/run_tests.gd"
      - "docs/reference/runtime-tourmap-classic.png"
      - "docs/reference/runtime-tourmap-classic.png.import"
      - "docs/reference/runtime-tourmap-market.png"
      - "docs/reference/runtime-tourmap-market.png.import"
      - "docs/reference/runtime-tourmap-wrap.png"
      - "docs/reference/runtime-tourmap-wrap.png.import"
    verify:
      - "Godot editor parse/import"
      - "Godot unit suite failures=0 with layout/wrap/reachability tests"
      - "DICE_QA_TOURMAP deterministic switch/wrap/scenic/input route"
      - "Fresh 360x640 classic/market/wrap captures"
      - "CLEAN/LAP/LANDMARK/SPICE/RISK/M3/M4A/dice regressions"
      - "git diff --check and CLEAN diff preservation audit"
    stop_if:
      - "Need files outside allowed_files."
      - "既存ゲームロジックまたはsave意味論の変更が必要。"
      - "15-slot geometry cannot fit existing central map allocation."
      - "New/generated raster art or TOURMAP-03 map dice is needed."
      - "同じ検証が2回連続で失敗する。"
    receipt:
      result: done
      summary: "表示専用TourismMapView、15 wrapped slots、曲線遠近、市場景観、到達範囲、Classic既定/idle切替、QA hookを実装。"
      changed_files:
        - "scripts/game/tourism_map_view.gd"
        - "scripts/game/tourism_map_view.gd.uid"
        - "scripts/app/main.gd"
        - "tests/run_tests.gd"
      commands:
        - cmd: "Godot unit suite"
          status: pass
        - cmd: "DICE_QA_TOURMAP"
          status: pass
        - cmd: "360x250 and 720x390 geometry/player bounds"
          status: pass
        - cmd: "git diff --check"
          status: pass
      residual:
        - "GUI 360x640 classic/market/wrap captures delegated to PM."

  - id: T999
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "TOURMAP-01が切替安全性、観光地図らしさ、360x640、回帰条件を満たすか監査する。"
    inputs:
      - "All receipts"
      - "Fresh Classic/Tourism captures"
      - "Last verification"
      - "Current dirty diff"
    constraints:
      - "Do not implement."
    expected_output:
      - "complete | not_complete"
      - "missing evidence"
      - "next task if not complete"
    receipt:
      result: complete
      decision: complete
      summary: "再取得した360x640 market captureで黒欠落が解消し、景観、S字ルート、Classic minimap、下部ダイスと操作領域の共存を確認。既存QA・回帰証拠と合わせてTOURMAP-01完了。"
      evidence:
        - "docs/reference/runtime-tourmap-market.png"
        - "docs/reference/runtime-tourmap-wrap.png"
        - "docs/reference/runtime-tourmap-classic.png"
        - "Godot unit suite failures=0"
        - "DICE_QA_TOURMAP all true"
        - "CLEAN/LAP/LANDMARK/SPICE/RISK/EARLY_STOP/M3/M4A/DICE_PROGRESSION regressions pass"
        - "git diff --check pass"
      deferred:
        - "TOURMAP-02 free asset plus GPT-Image 2 district scenery"
        - "TOURMAP-03 map dice presentation"
        - "TOURMAP-04 camera and movement"
        - "TOURMAP-05 CLEAN/FLOW presentation"

  - id: T004
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "三段グリッドに見えるTourismMapを、現在地下中央の連続S字ルートと円形地形マーカーへ修正する。"
    inputs:
