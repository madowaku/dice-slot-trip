      - "docs/reference/runtime-tourmap-wrap.png"
    constraints:
      - "ロジック、Main切替、Classic、minimap、景観assetは変更しない。"
      - "15 slots、wrap、reachability、bounds/non-overlap契約を維持する。"
      - "白い長方形カードや三本の横列に見せない。"
    allowed_files:
      - "scripts/game/tourism_map_view.gd"
      - "tests/run_tests.gd"
    verify:
      - "360x250 and 720x390 bounds/non-overlap/player tests"
      - "Godot unit suite failures=0"
      - "DICE_QA_TOURMAP"
      - "Fresh market/wrap captures by PM"
      - "git diff --check"
    stop_if:
      - "Need files outside allowed_files."
      - "Existing central allocation cannot show a continuous route with 15 readable markers."
      - "Gameplay or asset changes are needed."
    receipt:
      result: done
      summary: "三段グリッドを現在地下中央の連続S字道へ変更し、長方形カードを円形石マーカーへ置換。"
      changed_files:
        - "scripts/game/tourism_map_view.gd"
        - "tests/run_tests.gd"
      commands:
        - cmd: "Godot unit suite"
          status: pass
        - cmd: "DICE_QA_TOURMAP"
          status: pass
        - cmd: "360x250/720x390 bounds, non-overlap, non-grid geometry"
          status: pass
        - cmd: "git diff --check"
          status: pass

