version: 2

goal:
  title: "TOURMAP-03C マップ上2／3／5ダイス"
  slug: "dice-slot-trip-tourmap-03c-multi-dice-overlay"
  kind: specific
  tranche: "Canvas 2.5D map overlayを複数ダイスへ拡張する"
  status: done

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true

agents:
  scout: installed
  worker: installed
  judge: installed

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    objective: "既存03A／03B基盤と2／3／5ダイスの表示・停止・選択境界を監査する。"
    inputs:
      - "scripts/game/map_dice_overlay.gd"
      - "scripts/app/main.gd"
      - "scripts/game/tourism_map_view.gd"
      - "tests/run_tests.gd"
    expected_output:
      - "safe multi-dice presentation boundary"
      - "landing formation and input risks"
      - "QA additions"
    receipt:
      result: done
      summary: "03Aは単一billboard／count==1分岐で、Mainは先頭出目を強調。2／3／5拡張はOverlay pool、count-aware landing、合計値、5個選択境界が必要。"
      evidence:
        - "scripts/game/map_dice_overlay.gd"
        - "scripts/app/main.gd"
        - "scripts/game/tourism_map_view.gd"
        - "tests/run_tests.gd"
      spawned_tasks:
        - T002
        - T003

  - id: T002
    type: judge
    assignee: Judge
    status: done
    objective: "Scout証拠から複数ダイス拡張のallowed_filesと受入条件を決定する。"
    expected_output:
      - "approve | revise | reject"
      - "exact Worker scope"
      - "verify"
    receipt:
      result: done
      decision: "approve"
      summary: "GameState/save/Classicを変更せず、Overlay・map geometry・Mainのpreview/hold・testsへ限定する。"
      next_allowed_task: T003

  - id: T003
    type: worker
    assignee: Worker
    status: done
    objective: "Tourism Mapの2／3／5ダイスOverlay、count-aware landing、結果保持、QAを実装する。"
    allowed_files:
      - "scripts/game/map_dice_overlay.gd"
      - "scripts/game/tourism_map_view.gd"
      - "scripts/app/main.gd"
      - "tests/run_tests.gd"
    verify:
      - "Godot targeted/full unit tests"
      - "Tourism multi-dice runtime QA"
      - "03A and regression QA"
      - "git diff --check"
    stop_if:
      - "Need gameplay rule or save schema changes."
      - "Need files outside allowed_files."
      - "Classic or 1-die regression."
    receipt:
      result: done
      changed_files:
        - "scripts/game/map_dice_overlay.gd"
        - "scripts/game/tourism_map_view.gd"
        - "scripts/app/main.gd"
        - "tests/run_tests.gd"
      summary: "Tourism 2/3/5 billboard pool、3+2 formation、count-aware landing、合計値preview、5個選択前の強調抑制、一括停止入力除外を実装。"
      commands:
        - cmd: "Godot --headless --path . --script tests/run_tests.gd"
          status: pass
        - cmd: "DICE_QA_TOURMAP_MULTI_DIE=1 Godot --headless --path ."
          status: pass
        - cmd: "DICE_QA_TOURMAP_DIE=1 Godot --headless --path ."
          status: pass
        - cmd: "LAP_LANDMARK/M3/M4A/CLEAN_LAP/RISK/ONE_DIE runtime QA"
          status: pass
        - cmd: "DICE_QA_STOP_ALL=1 Godot --headless --path ."
          status: pass
      residual:
        - "複数ダイスの実画面キャプチャは次のUI polishで追加する。"

  - id: T999
    type: judge
    assignee: Judge
    status: done
    objective: "複数ダイスOverlayが受入条件と既存回帰を満たすか最終監査する。"
    expected_output:
      - "complete | not_complete"
      - "missing evidence"
      - "residual risks"
    receipt:
      result: complete
      decision: "complete"
      summary: "実形成領域を画面 bounds、拡大プレイヤー、全可視ルートマスへ照合する探索へ修正。合計18表示、2/3/5形成、5ダイス選択前強調抑制、Classic/1ダイス分離、入力除外、プール再利用を最終監査で承認。"
      evidence:
        - "tests/run_tests.gd: DICE_SLOT_TRIP_TESTS failures=0"
        - "QA_TOURMAP_MULTI_DIE passed=true"
        - "QA_TOURMAP_DIE 20 rolls passed=true"
        - "QA_ROLL_TRANSACTION passed=true"
      residual:
        - "3ダイス専用DICE SLOT枠・役ライン演出は次の03Dスライス。"

checks:
  dirty_fingerprint: "03B commit d9affda; unrelated user specs, image imports, and reference image remain untracked and excluded."
  last_verification:
    result: pass
    task: T999
    evidence:
      - "DICE_SLOT_TRIP_TESTS failures=0"
      - "QA_TOURMAP_MULTI_DIE passed=true"
      - "QA_TOURMAP_DIE 20 rolls passed=true"
      - "QA_ROLL_TRANSACTION passed=true"
      - "360x250 multi-die footprints avoid all visible route tiles and player"
      - "M3/M4A/CLEAN/RISK/LAP/LANDMARK/ONE_DIE/STOP_ALL passed=true"
